default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  # ローカルでは.envがあればそれを使う、なければ直接指定も可
  url: <%= ENV["DATABASE_URL"] %>

test:
  <<: *default
  database: secondpath_backend_test
  # `DATABASE_URL` が設定されている（例: Supabase）と test でもそちらに接続してしまうことがあるため、
  # test は専用URLがある場合のみそれを使い、なければ `database:` 設定を使う。
  url: <%= ENV["TEST_DATABASE_URL"] %>

production:
  <<: *default
  # DATABASE_URLから接続情報を読み込む
  url: <%= ENV["DATABASE_URL"] %>
  # Supabase (Transaction Mode) のための必須設定
  prepared_statements: false
  # SSL接続を強制
  sslmode: 'require'