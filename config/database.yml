default: &default
  adapter: postgresql
  encoding: unicode
  # 先ほど作った .env の DATABASE_URL を使う設定
  url: <%= ENV.fetch("DATABASE_URL") %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default

test:
  <<: *default
  database: secondpath_backend_test

production:
  <<: *default